name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - server/**
      - render.yaml
      - .github/workflows/deploy-backend-render.yml
  workflow_dispatch:

concurrency:
  group: deploy-backend-render
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl --fail --show-error --silent --location --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
